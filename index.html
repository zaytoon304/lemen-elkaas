<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لمن الكأس؟</title>
  <style>
    :root {
      --bg1: #0f0c29;
      --bg2: #302b63;
      --card: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.15);
      --t1: #4facfe;
      --t2: #f7971e;
      --ok: #00b894;
      --bad: #d63031;
      --gold: #ffd700;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 60%, #24243e 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
    }
    #app { width: 100%; max-width: 820px; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      margin-bottom: 18px;
    }

    /* ── Setup screen ── */
    .hero { text-align: center; padding: 30px 20px 20px; }
    .trophy-big { font-size: 5rem; display: block; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .game-title {
      font-size: 2.8rem; font-weight: 900;
      color: var(--gold);
      text-shadow: 0 0 30px rgba(255,215,0,.5);
      margin: 8px 0 4px;
    }
    .game-sub { color: rgba(255,255,255,.55); font-size: .95rem; }

    .sec-label {
      font-size: .8rem; font-weight: 700;
      color: rgba(255,255,255,.55);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .teams-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 22px; }
    .team-input {
      background: rgba(255,255,255,.07);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 13px 16px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      width: 100%;
      transition: .25s;
    }
    .team-input:focus { outline: none; background: rgba(255,255,255,.14); }
    #inp-t1 { border-color: var(--t1); }
    #inp-t2 { border-color: var(--t2); }

    .subjects-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 22px; }
    .subj-btn {
      background: rgba(255,255,255,.08);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 8px;
      color: #fff;
      cursor: pointer;
      font-size: .9rem;
      text-align: center;
      transition: .2s;
    }
    .subj-btn:hover { background: rgba(255,255,255,.15); transform: translateY(-2px); }
    .subj-btn.sel { background: rgba(79,172,254,.22); border-color: var(--t1); box-shadow: 0 0 16px rgba(79,172,254,.3); }
    .subj-icon { display: block; font-size: 2rem; margin-bottom: 5px; }

    .btn-row { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
    .pick-btn {
      flex: 1; min-width: 50px;
      background: rgba(255,255,255,.08);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 11px 8px;
      color: #fff;
      cursor: pointer;
      font-size: .95rem;
      transition: .2s;
      text-align: center;
    }
    .pick-btn:hover { background: rgba(255,255,255,.16); }
    .pick-btn.sel-grade { background: rgba(247,151,30,.22); border-color: var(--t2); box-shadow: 0 0 14px rgba(247,151,30,.3); }
    .pick-btn.sel-easy  { background: rgba(0,184,148,.22); border-color: var(--ok); }
    .pick-btn.sel-medium{ background: rgba(253,203,110,.22); border-color: #fdcb6e; }
    .pick-btn.sel-hard  { background: rgba(214,48,49,.22); border-color: var(--bad); }

    .btn-start {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--gold), #ff8c00);
      border: none;
      border-radius: 16px;
      color: #1a1a1a;
      font-size: 1.25rem;
      font-weight: 900;
      cursor: pointer;
      transition: .3s;
      box-shadow: 0 6px 24px rgba(255,215,0,.4);
    }
    .btn-start:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(255,215,0,.5); }

    /* ── Game screen ── */
    .score-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .t-score { text-align: center; flex: 1; }
    .t-name {
      font-size: .85rem; font-weight: 700;
      padding: 5px 14px; border-radius: 20px;
      margin-bottom: 4px;
      display: inline-block;
      transition: .3s;
    }
    #t1-name-lbl { color: var(--t1); }
    #t2-name-lbl { color: var(--t2); }
    .t-pts { font-size: 2.6rem; font-weight: 900; }
    #t1-pts { color: var(--t1); }
    #t2-pts { color: var(--t2); }
    .q-counter { text-align: center; color: rgba(255,255,255,.5); font-size: .85rem; line-height: 1.3; }

    .turn-bar {
      text-align: center;
      padding: 9px 20px;
      border-radius: 25px;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      transition: .4s;
    }
    .turn-bar.t1 { background: rgba(79,172,254,.2); color: var(--t1); border: 1px solid rgba(79,172,254,.3); }
    .turn-bar.t2 { background: rgba(247,151,30,.2); color: var(--t2); border: 1px solid rgba(247,151,30,.3); }

    .steal-banner {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #1a1a1a;
      padding: 10px 20px;
      border-radius: 12px;
      text-align: center;
      font-weight: 800;
      font-size: 1rem;
      margin-bottom: 12px;
      display: none;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from { transform: translateY(-8px); opacity:0; } to { transform: translateY(0); opacity:1; } }

    .timer-wrap { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 18px; }
    .timer-num { font-size: 1.6rem; font-weight: 900; color: var(--gold); min-width: 40px; text-align: center; }
    .timer-track { flex: 1; max-width: 220px; height: 10px; background: rgba(255,255,255,.15); border-radius: 5px; overflow: hidden; }
    .timer-fill { height: 100%; border-radius: 5px; transition: width 1s linear, background-color .5s; background: #00b09b; }

    .q-text { font-size: 1.5rem; font-weight: 700; text-align: center; line-height: 1.7; margin-bottom: 24px; padding: 10px 0; }

    .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .ch-btn {
      background: rgba(255,255,255,.09);
      border: 2px solid rgba(255,255,255,.18);
      border-radius: 16px;
      padding: 14px 18px;
      color: #fff;
      font-size: 1.05rem;
      cursor: pointer;
      text-align: right;
      transition: .18s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ch-btn:hover:not(:disabled) { background: rgba(255,255,255,.18); transform: translateY(-2px); }
    .ch-btn:disabled { cursor: default; }
    .ch-btn.correct { background: rgba(0,184,148,.3) !important; border-color: var(--ok) !important; animation: correctPop .4s ease; }
    .ch-btn.wrong { background: rgba(214,48,49,.3) !important; border-color: var(--bad) !important; animation: wrongShake .4s ease; }
    .ch-btn.reveal { background: rgba(0,184,148,.15); border-color: rgba(0,184,148,.4); }
    @keyframes correctPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
    @keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .ch-letter {
      min-width: 30px; height: 30px;
      background: rgba(255,255,255,.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700;
    }

    /* ── Result screen ── */
    .result-center { text-align: center; }
    .winner-txt { font-size: 2.2rem; font-weight: 900; color: var(--gold); margin: 10px 0 20px; }
    .draw-txt { color: rgba(255,255,255,.8); }
    .final-scores { display: flex; justify-content: center; gap: 50px; margin: 20px 0 30px; }
    .fs-item { text-align: center; }
    .fs-name { font-size: .85rem; color: rgba(255,255,255,.6); margin-bottom: 6px; }
    .fs-num { font-size: 3.5rem; font-weight: 900; }
    #fs1 { color: var(--t1); }
    #fs2 { color: var(--t2); }

    .btn-again {
      background: linear-gradient(135deg, var(--t1), #667eea);
      border: none; border-radius: 16px;
      color: #fff; font-size: 1.15rem; font-weight: 700;
      padding: 16px 44px; cursor: pointer; transition: .3s;
      box-shadow: 0 6px 20px rgba(79,172,254,.35);
    }
    .btn-again:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(79,172,254,.45); }

    /* confetti */
    .confetti-wrap { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; overflow:hidden; }
    .cf {
      position: absolute;
      width: 9px; height: 18px;
      top: -20px;
      border-radius: 3px;
      animation: cfFall linear forwards;
    }
    @keyframes cfFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: .2; }
    }

    /* feedback pop */
    .feedback { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:5rem; pointer-events:none; opacity:0; z-index:1000; }
    .feedback.show { animation: feedPop 1s ease forwards; }
    @keyframes feedPop {
      0%   { transform:translate(-50%,-50%) scale(.4); opacity:1; }
      50%  { transform:translate(-50%,-50%) scale(1.4); opacity:1; }
      100% { transform:translate(-50%,-80%) scale(1); opacity:0; }
    }

    @media(max-width:520px){
      .game-title { font-size: 2rem; }
      .subjects-grid { grid-template-columns: repeat(2,1fr); }
      .q-text { font-size: 1.15rem; }
      .ch-btn { font-size: .9rem; padding: 11px 12px; }
      .btn-row .pick-btn { font-size: .8rem; padding: 9px 5px; }
      .final-scores { gap: 28px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ░░ SETUP SCREEN ░░ -->
  <div id="scr-setup" class="screen active">
    <div class="card hero">
      <span class="trophy-big">🏆</span>
      <div class="game-title">لمن الكأس؟</div>
      <div class="game-sub">لعبة المسابقات التعليمية — تنافس بالعلم!</div>
    </div>

    <div class="card">
      <div class="sec-label">أسماء الفريقين</div>
      <div class="teams-row">
        <input id="inp-t1" class="team-input" type="text" placeholder="🔵 الفريق الأول" maxlength="20">
        <input id="inp-t2" class="team-input" type="text" placeholder="🟠 الفريق الثاني" maxlength="20">
      </div>

      <div class="sec-label">اختر المادة</div>
      <div class="subjects-grid" id="subj-grid">
        <button class="subj-btn" data-s="math">   <span class="subj-icon">🔢</span>الرياضيات</button>
        <button class="subj-btn" data-s="arabic">  <span class="subj-icon">📖</span>اللغة العربية</button>
        <button class="subj-btn" data-s="english"> <span class="subj-icon">🌐</span>اللغة الإنجليزية</button>
        <button class="subj-btn" data-s="science"> <span class="subj-icon">🔬</span>العلوم</button>
        <button class="subj-btn" data-s="social">  <span class="subj-icon">🌍</span>الاجتماعيات</button>
        <button class="subj-btn" data-s="islamic"> <span class="subj-icon">☪️</span>التربية الإسلامية</button>
      </div>

      <div class="sec-label">اختر الصف الدراسي</div>
      <div class="btn-row" id="grade-row">
        <button class="pick-btn" data-g="1">الأول</button>
        <button class="pick-btn" data-g="2">الثاني</button>
        <button class="pick-btn" data-g="3">الثالث</button>
        <button class="pick-btn" data-g="4">الرابع</button>
        <button class="pick-btn" data-g="5">الخامس</button>
        <button class="pick-btn" data-g="6">السادس</button>
      </div>

      <div class="sec-label">اختر المستوى</div>
      <div class="btn-row" id="level-row">
        <button class="pick-btn" data-l="easy">سهل 🟢</button>
        <button class="pick-btn" data-l="medium">متوسط 🟡</button>
        <button class="pick-btn" data-l="hard">صعب 🔴</button>
      </div>

      <button class="btn-start" id="btn-start">🏆 ابدأ المسابقة!</button>
    </div>
  </div>

  <!-- ░░ GAME SCREEN ░░ -->
  <div id="scr-game" class="screen">
    <div class="score-bar">
      <div class="t-score">
        <div class="t-name" id="t1-name-lbl">الفريق الأول</div>
        <div class="t-pts" id="t1-pts">0</div>
      </div>
      <div class="q-counter" id="q-counter">سؤال<br>1 / 10</div>
      <div class="t-score">
        <div class="t-name" id="t2-name-lbl">الفريق الثاني</div>
        <div class="t-pts" id="t2-pts">0</div>
      </div>
    </div>

    <div class="card">
      <div class="turn-bar t1" id="turn-bar">دور الفريق الأول 🔵</div>
      <div class="steal-banner" id="steal-banner">⚡ فرصة الاختطاف للفريق الآخر!</div>

      <div class="timer-wrap">
        <div class="timer-num" id="timer-num">30</div>
        <div class="timer-track">
          <div class="timer-fill" id="timer-fill" style="width:100%"></div>
        </div>
      </div>

      <div class="q-text" id="q-text">جاري تحميل السؤال...</div>

      <div class="choices-grid" id="choices-grid">
        <button class="ch-btn" id="ch0" onclick="G.pick(0)"><span class="ch-letter">أ</span><span id="ct0"></span></button>
        <button class="ch-btn" id="ch1" onclick="G.pick(1)"><span class="ch-letter">ب</span><span id="ct1"></span></button>
        <button class="ch-btn" id="ch2" onclick="G.pick(2)"><span class="ch-letter">ج</span><span id="ct2"></span></button>
        <button class="ch-btn" id="ch3" onclick="G.pick(3)"><span class="ch-letter">د</span><span id="ct3"></span></button>
      </div>
    </div>
  </div>

  <!-- ░░ RESULT SCREEN ░░ -->
  <div id="scr-result" class="screen">
    <div class="confetti-wrap" id="confetti-wrap"></div>
    <div class="card result-center">
      <span style="font-size:5rem;">🏆</span>
      <div class="winner-txt" id="winner-txt">...</div>
      <div class="final-scores">
        <div class="fs-item">
          <div class="fs-name" id="fs1-name">الفريق الأول</div>
          <div class="fs-num" id="fs1">0</div>
        </div>
        <div style="display:flex;align-items:center;font-size:2rem;">⚔️</div>
        <div class="fs-item">
          <div class="fs-name" id="fs2-name">الفريق الثاني</div>
          <div class="fs-num" id="fs2">0</div>
        </div>
      </div>
      <button class="btn-again" onclick="G.reset()">🔄 العب مرة أخرى</button>
    </div>
  </div>

</div>
<div class="feedback" id="feedback"></div>

<script src="questions-math.js"></script>
<script src="questions-arabic.js"></script>
<script src="questions-english.js"></script>
<script src="questions-science.js"></script>
<script src="questions-social.js"></script>
<script src="questions-islamic.js"></script>
<script src="questions.js"></script>
<script src="game.js"></script>
</body>
</html>
